<!DOCTYPE html>
<html>
<head>
    <title>Library System</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 0; padding: 0; background: #f4f4f4; }
        .navbar { background: #333; padding: 15px; color: white; display: flex; justify-content: space-between; }
        .navbar a { color: white; margin: 0 10px; text-decoration: none; }
        .container { padding: 20px; max-width: 800px; margin: auto; }
        .alert { padding: 15px; margin-bottom: 20px; border-radius: 5px; text-align: center; }
        .alert-success { background: #d4edda; color: #155724; }
        .alert-danger { background: #f8d7da; color: #721c24; }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="{% url 'index' %}">Home</a>
        <div>
            {% if user.is_authenticated %}
                <span>Welcome, {{ user.username }}</span>
                <a href="{% url 'logout' %}">Logout</a>
            {% else %}
                <a href="{% url 'login' %}">Login</a>
                <a href="{% url 'register' %}">Register</a>
            {% endif %}
        </div>
    </nav>

    <div class="container">
        {% for msg in messages %}
            <div class="alert alert-{% if msg.tags == 'error' %}danger{% else %}{{ msg.tags }}{% endif %}">
                {{ msg }}
            </div>
        {% endfor %}

        {% block content %} {% endblock %}
    </div>
</body>
</html>
