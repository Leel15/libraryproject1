{% extends 'usermodule/base.html' %}

{% block content %}
<style>
    .register-card {
        max-width: 400px;
        margin: 50px auto;
        padding: 30px;
        background: #fff;
        border-radius: 15px;
        box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }

    form {
        display: flex;
        flex-direction: column; 
    }

    form label, form input, form select, form textarea {
        display: block;
        width: 100%;
        margin-bottom: 10px;
        box-sizing: border-box;
    }

    form label {
        font-weight: bold;
        margin-top: 10px;
        color: #333;
    }

    form input {
        padding: 10px;
        border: 1px solid #ccc;
        border-radius: 5px;
    }

    .btn-submit {
        margin-top: 20px;
        padding: 12px;
        background-color: #2c3e50;
        color: white;
        border: none;
        border-radius: 5px;
        cursor: pointer;
        font-weight: bold;
    }
    
    ul.errorlist {
        display: none; 
    }
</style>

<div class="register-card">
    <h2>Register</h2>
    <form method="post">
        {% csrf_token %}
      
        {{ form }}

        <button type="submit" class="btn-submit">Create Account</button>
    </form>
</div>
{% endblock %}
