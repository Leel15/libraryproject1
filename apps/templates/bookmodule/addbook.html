<style>
    .form-container { 
        width: 450px; 
        margin: 50px auto; 
        padding: 30px; 
        border-radius: 12px; 
        box-shadow: 0px 4px 20px rgba(0,0,0,0.1); 
        background-color: #ffffff;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    
    .form-container h3 { 
        text-align: center; 
        color: #2c3e50; 
        margin-bottom: 25px;
        border-bottom: 2px solid #3498db;
        padding-bottom: 10px;
    }

    table { width: 100%; }
    td { padding: 12px 5px; }
    label { font-weight: bold; color: #34495e; }

    input[type="text"], input[type="number"] { 
        width: 100%; 
        padding: 10px; 
        border: 1px solid #dcdde1; 
        border-radius: 6px; 
        box-sizing: border-box; 
        transition: border 0.3s;
    }
    
    input:focus { border-color: #3498db; outline: none; }

    .btn-submit { 
        width: 100%; 
        padding: 12px; 
        background-color: #2ecc71; 
        color: white; 
        border: none; 
        border-radius: 6px; 
        cursor: pointer; 
        font-size: 16px; 
        font-weight: bold;
        margin-top: 15px;
    }
    
    .btn-submit:hover { background-color: #27ae60; }
    
    .cancel-link { 
        display: block; 
        text-align: center; 
        margin-top: 15px; 
        color: #7f8c8d; 
        text-decoration: none; 
    }
    
    .cancel-link:hover { color: #c0392b; }
</style>

<div class="form-container">
    <h3>{% if book %} Edit Book: {{ book.title }} {% else %} Add New Book {% endif %}</h3>
    
    <form method="post">
        {% csrf_token %}
        <table>
            <tr>
                <td><label>Title</label></td>
                <td><input type="text" name="title" value="{{ book.title|default:'' }}" placeholder="Enter book title" required></td>
            </tr>
            <tr>
                <td><label>Author</label></td>
                <td><input type="text" name="author" value="{{ book.author|default:'' }}" placeholder="Enter author name" required></td>
            </tr>
            <tr>
                <td><label>Price</label></td>
                <td><input type="text" name="price" value="{{ book.price|default:'' }}" placeholder="0.00" required></td>
            </tr>
            <tr>
                <td><label>Edition</label></td>
                <td><input type="number" name="edition" value="{{ book.edition|default:'1' }}" required></td>
            </tr>
            <tr>
                <td colspan="2">
                    <button type="submit" class="btn-submit">
                        {% if book %} Update Book Information {% else %} Save New Book {% endif %}
                    </button>
                </td>
            </tr>
        </table>
    </form>
    
    <a href="{% url 'list_books' %}" class="cancel-link">Cancel and Return</a>
</div>
