{% extends "layouts/base.html" %}

{% block content %}
<div style="padding: 20px;">
    <h1 style="color: #2d3436; border-left: 5px solid #0984e3; padding-left: 15px; margin-bottom: 30px;">Library Insights</h1>
    
    <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px;">
        <div style="background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 4px solid #0984e3;">
            <p style="color: #636e72; font-size: 0.9em; margin: 0;">Total Books</p>
            <h2 style="margin: 10px 0; color: #2d3436;">{{ stats.total_books }}</h2>
        </div>

        <div style="background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 4px solid #00b894;">
            <p style="color: #636e72; font-size: 0.9em; margin: 0;">Average Price</p>
            <h2 style="margin: 10px 0; color: #2d3436;">${{ stats.avg_price|floatformat:2 }}</h2>
        </div>

        <div style="background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 4px solid #d63031;">
            <p style="color: #636e72; font-size: 0.9em; margin: 0;">Max Price</p>
            <h2 style="margin: 10px 0; color: #2d3436;">${{ stats.max_price }}</h2>
        </div>

        <div style="background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 4px solid #f1c40f;">
            <p style="color: #636e72; font-size: 0.9em; margin: 0;">Min Price</p>
            <h2 style="margin: 10px 0; color: #2d3436;">${{ stats.min_price }}</h2>
        </div>
    </div>
</div>
{% endblock %}
