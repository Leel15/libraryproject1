{% extends "layouts/base.html" %}

{% block content %}
<div style="padding: 20px; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;">
    <h1 style="background: linear-gradient(45deg, #4b5d67, #322f3d); color: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 30px;">
        {{ title }}
    </h1>

    <div style="overflow-x: auto; background: white; border-radius: 10px; box-shadow: 0 8px 16px rgba(0,0,0,0.05);">
        <table style="width: 100%; border-collapse: collapse; text-align: left;">
            <thead>
                <tr style="background-color: #f8f9fa; border-bottom: 2px solid #dee2e6;">
                    <th style="padding: 15px;">ID</th>
                    <th style="padding: 15px;">Book Title</th>
                    <th style="padding: 15px;">Author</th>
                    <th style="padding: 15px;">Price</th>
                    <th style="padding: 15px;">Edition</th>
                </tr>
            </thead>
            <tbody>
                {% for obj in books %}
                <tr style="border-bottom: 1px solid #eee; transition: background 0.3s;" onmouseover="this.style.backgroundColor='#f1f1f1'" onmouseout="this.style.backgroundColor='transparent'">
                    <td style="padding: 15px; font-weight: bold; color: #666;">#{{ obj.id }}</td>
                    <td style="padding: 15px; color: #333;">{{ obj.title }}</td>
                    <td style="padding: 15px; color: #555;">{{ obj.author }}</td>
                    <td style="padding: 15px;"><span style="background: #e1ffed; color: #28a745; padding: 5px 10px; border-radius: 20px; font-weight: bold;">${{ obj.price }}</span></td>
                    <td style="padding: 15px;"><span style="background: #eef2ff; color: #4f46e5; padding: 5px 10px; border-radius: 5px;">Edition {{ obj.edition }}</span></td>
                </tr>
                {% empty %}
                <tr>
                    <td colspan="5" style="padding: 30px; text-align: center; color: #999;">No books match your search.</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
