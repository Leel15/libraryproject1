<style>
    .form-container {
        max-width: 500px;
        margin: 50px auto;
        padding: 30px;
        background: #ffffff;
        border-radius: 12px;
        box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .form-container h3 { color: #333; margin-bottom: 20px; text-align: center; }
    .form-control-group { margin-bottom: 15px; }
    .form-control-group label { display: block; margin-bottom: 5px; font-weight: 600; color: #555; }
    input[type="text"], input[type="file"] {
        width: 100%;
        padding: 10px;
        border: 1px solid #ddd;
        border-radius: 6px;
        box-sizing: border-box;
    }
    .btn-submit {
        width: 100%;
        padding: 12px;
        background-color: #28a745;
        color: white;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        font-size: 16px;
        transition: background 0.3s;
    }
    .btn-submit:hover { background-color: #218838; }
    .back-link { display: block; text-align: center; margin-top: 15px; color: #007bff; text-decoration: none; }
</style>

<div class="form-container">
    <h3>Adding a New Book Gallery</h3>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        
        {{form}}
        
        <button type="submit" class="btn-submit">Upload to Gallery</button>
    </form>
    <a href="{% url 'book_gallery_list' %}" class="back-link">← View Gallery</a>
</div>
