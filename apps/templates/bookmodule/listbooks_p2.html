<style>
    .container { width: 90%; margin: 30px auto; font-family: 'Segoe UI', Tahoma, sans-serif; }
    .header-box { display: flex; justify-content: space-between; align-items: center; background: #34495e; color: white; padding: 15px 25px; border-radius: 8px; }
    table { width: 100%; border-collapse: collapse; margin-top: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
    th { background-color: #3498db; color: white; padding: 15px; text-align: left; }
    td { padding: 12px 15px; border-bottom: 1px solid #ddd; }
    tr:hover { background-color: #f1f2f6; }
    .btn { padding: 8px 15px; text-decoration: none; border-radius: 5px; font-weight: bold; font-size: 14px; }
    .btn-add { background-color: #2ecc71; color: white; }
    .btn-edit { background-color: #f1c40f; color: #2c3e50; margin-right: 5px; }
    .btn-delete { background-color: #e74c3c; color: white; }
</style>

<div class="container">
    <div class="header-box">
        <h2>Book Management (Part 2 - Django Forms)</h2>
        <a href="{% url 'add_book_p2' %}" class="btn btn-add">+ Add Book</a>
    </div>

    <table>
        <thead>
            <tr>
                <th>Title</th>
                <th>Author</th>
                <th>Price</th>
                <th>Edition</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            {% for b in books %}
            <tr>
                <td><strong>{{ b.title }}</strong></td>
                <td>{{ b.author }}</td>
                <td>${{ b.price }}</td>
                <td>{{ b.edition }}</td>
                <td>
                    <a href="{% url 'edit_book_p2' b.id %}" class="btn btn-edit">Edit</a>
                    <a href="{% url 'delete_book_p2' b.id %}" class="btn btn-delete">Delete</a>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="5" style="text-align: center; padding: 20px;">No books found. Start by adding one!</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
