<h3>Task 4: Price Statistics per Publisher</h3>
<table border="1">
    <tr>
        <th>Publisher</th>
        <th>Avg Price</th>
        <th>Min Price</th>
        <th>Max Price</th>
    </tr>
    {% for pub in publishers %}
    <tr>
        <td>{{ pub.name }}</td>
        <td>${{ pub.avg_price|floatformat:2 }}</td>
        <td>${{ pub.min_price }}</td>
        <td>${{ pub.max_price }}</td>
    </tr>
    {% endfor %}
</table>
