<style>
    .form-container { 
        width: 450px; margin: 50px auto; padding: 30px; 
        border-radius: 12px; box-shadow: 0px 4px 20px rgba(0,0,0,0.1); 
        background-color: #fff; font-family: sans-serif;
    }
    .form-container h3 { text-align: center; color: #2c3e50; border-bottom: 2px solid #3498db; padding-bottom: 10px; }
    
    .form-control { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; display: block; }
    
    .btn-save { width: 100%; padding: 12px; background-color: #3498db; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; }
    .btn-save:hover { background-color: #2980b9; }
</style>

<div class="form-container">
    <h3>{% if form.instance.id %} Update Book (P2) {% else %} Add New Book (P2) {% endif %}</h3>
    
    <form method="post">
        {% csrf_token %}
        
        
                {{ form }} 
            
        
        <button type="submit" class="btn-save">Save changes</button>
    </form>
    <p style="text-align: center;"><a href="{% url 'list_books_p2' %}">Back to List</a></p>
</div>
